<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sonic Ecosystem Engine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
    background: #0a0a0f;
    color: #c0c0c0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem;
  }
  h1 {
    font-size: 1.2rem;
    font-weight: normal;
    color: #606080;
    margin-bottom: 1.5rem;
    letter-spacing: 0.1em;
  }
  #status {
    font-size: 0.75rem;
    margin-bottom: 1.5rem;
  }
  #status.connected { color: #4a7; }
  #status.disconnected { color: #a44; }
  #status.connecting { color: #aa6; }

  #controls {
    display: flex;
    gap: 0.8rem;
    margin-bottom: 2rem;
    align-items: center;
  }
  button {
    font-family: inherit;
    font-size: 0.85rem;
    padding: 0.5rem 1.5rem;
    border: 1px solid #333;
    border-radius: 4px;
    background: #16161e;
    color: #aaa;
    cursor: pointer;
    transition: all 0.15s;
  }
  button:hover { background: #1e1e2e; border-color: #555; color: #ddd; }
  button:active { background: #252535; }
  button:disabled { opacity: 0.3; cursor: default; }
  #next-btn { border-color: #4a4a7a; color: #8888cc; }
  #next-btn:hover { border-color: #6666aa; color: #aaaaee; }
  #seed-input {
    font-family: inherit;
    font-size: 0.85rem;
    padding: 0.5rem 0.8rem;
    border: 1px solid #333;
    border-radius: 4px;
    background: #12121a;
    color: #aaa;
    width: 7rem;
    text-align: center;
  }
  #seed-input::placeholder { color: #444; }
  #seed-input:focus { outline: none; border-color: #555; }

  .panel {
    width: 100%;
    max-width: 740px;
    margin-bottom: 1.5rem;
  }

  #seed-display {
    font-size: 2rem;
    color: #8888cc;
    margin-bottom: 1rem;
    text-align: center;
  }

  /* Live status bar */
  .live-status {
    display: flex;
    gap: 1.5rem;
    align-items: center;
    font-size: 0.72rem;
    color: #555;
    margin-bottom: 1rem;
    padding: 0.4rem 0.9rem;
    background: #12121a;
    border: 1px solid #1a1a2a;
    border-radius: 4px;
  }
  .live-stat { display: flex; align-items: center; gap: 0.4rem; }
  .live-stat .label { color: #555; }
  .live-stat .value { color: #888; }
  .activity-bar-wrap {
    width: 80px; height: 4px;
    background: #1a1a25; border-radius: 2px; overflow: hidden;
  }
  .activity-bar {
    height: 100%; background: #5a7a5a;
    border-radius: 2px; transition: width 0.5s ease;
  }

  /* DNA bars */
  .dna-grid {
    display: grid;
    grid-template-columns: 90px 1fr 36px;
    gap: 0.25rem 0.6rem;
    align-items: center;
    font-size: 0.68rem;
    margin-bottom: 1rem;
  }
  .dna-label { color: #555; text-align: right; }
  .dna-bar-wrap {
    height: 5px; background: #151520;
    border-radius: 3px; overflow: hidden;
  }
  .dna-bar {
    height: 100%; border-radius: 3px;
    transition: width 0.6s ease;
  }
  .dna-val { color: #444; font-size: 0.6rem; }
  .dna-density .dna-bar { background: #7a6a3a; }
  .dna-spectral .dna-bar { background: #3a5a7a; }
  .dna-temporal .dna-bar { background: #6a3a5a; }
  .dna-sociality .dna-bar { background: #3a7a5a; }
  .dna-room .dna-bar { background: #5a5a7a; }

  /* Population display — emoji census */
  #population {
    background: #12121a;
    border: 1px solid #1a1a2a;
    border-radius: 4px;
    padding: 0.7rem 0.9rem;
    margin-bottom: 1rem;
    font-size: 1.1rem;
    line-height: 1.8;
    letter-spacing: 0.1em;
    word-break: break-all;
  }
  #population .pop-label {
    font-size: 0.65rem;
    color: #444;
    letter-spacing: 0;
    display: block;
    margin-bottom: 0.3rem;
  }
  #population .pop-empty {
    font-size: 0.7rem;
    color: #333;
    letter-spacing: 0;
  }

  /* Species legend */
  .species-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem 1.2rem;
    font-size: 0.68rem;
    color: #555;
    margin-bottom: 1rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .legend-emoji { font-size: 0.9rem; }
  .legend-source { color: #666; }
  .legend-fx { color: #444; }

  /* Medium */
  .medium-info {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem 1.2rem;
    font-size: 0.68rem;
    color: #555;
    margin-bottom: 1rem;
  }
  .medium-info span { color: #666; }

  .pitch-info {
    font-size: 0.68rem;
    color: #444;
    margin-bottom: 1.5rem;
  }

  /* History */
  #history h2 {
    font-size: 0.72rem;
    font-weight: normal;
    color: #444;
    margin-bottom: 0.4rem;
  }
  .history-entry {
    font-size: 0.68rem;
    padding: 0.25rem 0;
    border-bottom: 1px solid #131318;
    cursor: pointer;
    color: #444;
  }
  .history-entry:hover { color: #888; }
</style>
</head>
<body>

<h1>sonic ecosystem engine</h1>
<div id="status" class="disconnected">disconnected</div>

<div id="controls">
  <button id="next-btn" disabled>next biome</button>
  <input id="seed-input" type="number" placeholder="seed">
  <button id="goto-btn" disabled>go to seed</button>
</div>

<div class="panel">
  <div id="seed-display">--</div>

  <div id="live-status" class="live-status" style="display:none">
    <div class="live-stat">
      <span class="label">agents</span>
      <span class="value" id="live-agents">0</span>
    </div>
    <div class="live-stat">
      <span class="label">activity</span>
      <div class="activity-bar-wrap">
        <div class="activity-bar" id="live-activity-bar" style="width:0%"></div>
      </div>
    </div>
    <div class="live-stat" id="live-spawning-indicator" style="display:none">
      <span style="color:#aa6">transitioning</span>
    </div>
  </div>

  <div id="population"></div>

  <div id="species-legend" class="species-legend"></div>

  <div id="dna-section" class="dna-grid" style="display:none"></div>

  <div id="medium-section" class="medium-info" style="display:none"></div>

  <div id="pitch-section" class="pitch-info"></div>
</div>

<div class="panel" id="history">
  <h2>history</h2>
  <div id="history-list"></div>
</div>

<script>
const WS_URL = `ws://${location.hostname || 'localhost'}:8765`;

const ARCHETYPE_EMOJI = {
  caller:    '🐦',
  clicker:   '🦗',
  drone:     '🐋',
  swarm:     '🐝',
  responder: '🦉',
};

let ws;
let currentSeed = null;
let currentSpecies = [];
let lastSpeciesCounts = {};
const historyLog = [];

const statusEl = document.getElementById('status');
const seedEl = document.getElementById('seed-display');
const dnaSection = document.getElementById('dna-section');
const populationEl = document.getElementById('population');
const legendEl = document.getElementById('species-legend');
const mediumSection = document.getElementById('medium-section');
const pitchSection = document.getElementById('pitch-section');
const liveStatus = document.getElementById('live-status');
const liveAgents = document.getElementById('live-agents');
const liveActivityBar = document.getElementById('live-activity-bar');
const liveSpawning = document.getElementById('live-spawning-indicator');
const nextBtn = document.getElementById('next-btn');
const gotoBtn = document.getElementById('goto-btn');
const seedInput = document.getElementById('seed-input');
const historyList = document.getElementById('history-list');

const DNA_DIMS = [
  { key: 'density', label: 'density', cls: 'dna-density' },
  { key: 'spectral_center', label: 'spectral', cls: 'dna-spectral' },
  { key: 'temporal', label: 'temporal', cls: 'dna-temporal' },
  { key: 'sociality', label: 'sociality', cls: 'dna-sociality' },
  { key: 'room_scale', label: 'room', cls: 'dna-room' },
];

function connect() {
  statusEl.textContent = 'connecting...';
  statusEl.className = 'connecting';
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    statusEl.textContent = 'connected';
    statusEl.className = 'connected';
    nextBtn.disabled = false;
    gotoBtn.disabled = false;
    ws.send(JSON.stringify({ cmd: 'info' }));
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if ((data.event === 'biome_change' || data.event === 'info') && data.seed != null) {
      updateBiome(data);
    } else if (data.event === 'status') {
      updateLiveStatus(data);
    }
  };

  ws.onclose = () => {
    statusEl.textContent = 'disconnected \u2014 reconnecting...';
    statusEl.className = 'disconnected';
    nextBtn.disabled = true;
    gotoBtn.disabled = true;
    setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();
}

function updateBiome(data) {
  if (currentSeed != null && currentSeed !== data.seed) {
    historyLog.unshift({ seed: currentSeed, time: new Date() });
    renderHistory();
  }
  currentSeed = data.seed;
  currentSpecies = data.species || [];
  seedEl.textContent = `seed ${data.seed}`;

  if (data.dna) renderDNA(data.dna);
  if (data.species) renderLegend(data.species);
  if (data.medium) renderMedium(data.medium);
  if (data.pitch_set) renderPitch(data.pitch_set);
  liveStatus.style.display = 'flex';
  lastSpeciesCounts = {};
  renderPopulation();
}

function updateLiveStatus(data) {
  liveStatus.style.display = 'flex';
  liveAgents.textContent = data.agents_alive;
  const actPct = Math.min(data.activity / 10 * 100, 100);
  liveActivityBar.style.width = actPct + '%';
  liveSpawning.style.display = data.transitioning ? 'flex' : 'none';

  lastSpeciesCounts = data.species_counts || {};
  renderPopulation();
}

function renderPopulation() {
  if (!currentSpecies.length) {
    populationEl.innerHTML = '<span class="pop-empty">waiting...</span>';
    return;
  }
  // Build emoji string — one emoji per live agent, grouped by species
  let emojis = '';
  for (const sp of currentSpecies) {
    const emoji = ARCHETYPE_EMOJI[sp.archetype] || '❓';
    const count = lastSpeciesCounts[sp.name] || 0;
    emojis += emoji.repeat(count);
  }
  const total = Object.values(lastSpeciesCounts).reduce((a, b) => a + b, 0);
  populationEl.innerHTML =
    `<span class="pop-label">population ${total}</span>` +
    (emojis || '<span class="pop-empty">spawning...</span>');
}

function renderLegend(species) {
  legendEl.innerHTML = species.map(sp => {
    const emoji = ARCHETYPE_EMOJI[sp.archetype] || '❓';
    const src = sp.source.replace('src_', '');
    const fx = sp.effects.length ? sp.effects.map(f => f.replace('fx_','')).join(' ') : '';
    return `<div class="legend-item">
      <span class="legend-emoji">${emoji}</span>
      <span>${sp.archetype}</span>
      <span class="legend-source">${src}</span>
      ${fx ? `<span class="legend-fx">${fx}</span>` : ''}
    </div>`;
  }).join('');
}

function renderDNA(dna) {
  dnaSection.style.display = 'grid';
  dnaSection.innerHTML = DNA_DIMS.map(d => {
    const v = dna[d.key] || 0;
    const pct = (v * 100).toFixed(0);
    return `
      <div class="dna-label">${d.label}</div>
      <div class="dna-bar-wrap ${d.cls}">
        <div class="dna-bar" style="width:${pct}%"></div>
      </div>
      <div class="dna-val">${pct}%</div>
    `;
  }).join('');
}

function renderMedium(med) {
  mediumSection.style.display = 'flex';
  mediumSection.innerHTML = `
    <div>room <span>${med.reverb_roomsize}m</span></div>
    <div>decay <span>${med.reverb_time}s</span></div>
    <div>wet <span>${(med.reverb_mix * 100).toFixed(0)}%</span></div>
    <div>resonances <span>${med.n_resonances}</span></div>
    <div>floor <span>${med.noise_floor_level}dB</span></div>
  `;
}

function renderPitch(pitch) {
  pitchSection.textContent = `${pitch.strategy.replace('_',' ')} \u00b7 ${pitch.n_notes} notes`;
}

function renderHistory() {
  historyList.innerHTML = historyLog.slice(0, 15).map(h =>
    `<div class="history-entry" onclick="goToSeed(${h.seed})">
      seed ${h.seed} \u2014 ${timeSince(h.time)} ago
    </div>`
  ).join('');
}

function timeSince(date) {
  const s = Math.floor((Date.now() - date.getTime()) / 1000);
  if (s < 60) return `${s}s`;
  if (s < 3600) return `${Math.floor(s/60)}m`;
  return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;
}

function goToSeed(seed) {
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({ cmd: 'next', seed }));
}

nextBtn.addEventListener('click', () => {
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({ cmd: 'next' }));
});

gotoBtn.addEventListener('click', () => {
  const seed = parseInt(seedInput.value);
  if (!isNaN(seed)) { goToSeed(seed); seedInput.value = ''; }
});

seedInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') gotoBtn.click(); });

setInterval(renderHistory, 30000);
connect();
</script>
</body>
</html>
